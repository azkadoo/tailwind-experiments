<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example</title>
</head>
<body>
    <div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow sticky top-0">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <h1 class="text-2xl font-bold text-gray-800">My App</h1>
    </div>
  </header>
  
  <!-- Main content -->
  <div class="max-w-6xl mx-auto px-4 py-8">
    <div class="grid grid-cols-3 gap-6">
      <!-- Sidebar -->
      <aside class="bg-white rounded-lg shadow p-4">
        <nav class="space-y-2">
          <a href="#" class="block px-4 py-2 rounded hover:bg-blue-50 text-gray-700">
            Home
          </a>
          <a href="#" class="block px-4 py-2 rounded hover:bg-blue-50 text-gray-700">
            About
          </a>
          <a href="#" class="block px-4 py-2 rounded hover:bg-blue-50 text-gray-700">
            Contact
          </a>
        </nav>
      </aside>
      
      <!-- Content -->
      <main class="col-span-2 bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-4">Welcome</h2>
        <p class="text-gray-600 leading-relaxed">
          This is main content area. Grid layout makes responsive easy!
        </p>
      </main>
    </div>
  </div>
  
  <!-- Footer -->
  <footer class="bg-gray-800 text-white mt-12">
    <div class="max-w-6xl mx-auto px-4 py-8 text-center">
      <p>&copy; 2024 My App. All rights reserved.</p>
    </div>
  </footer>
</div>
</body>
</html>
